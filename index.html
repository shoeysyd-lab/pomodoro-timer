<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff6b6b">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <h1>Pomodoro Timer</h1>
        <div class="timer-display">
            <div class="hourglass" aria-label="Hourglass">⏳</div>
            <div id="time">25:00</div>
            <div id="mode">Work Session</div>
        </div>
        <div class="controls">
            <button id="start">Start</button>
            <button id="pause">Pause</button>
            <button id="reset">Reset</button>
        </div>
        <div class="modes">
            <button id="work" class="active">Work (25min)</button>
            <button id="short-break">Short Break (5min)</button>
            <button id="long-break">Long Break (15min)</button>
            <button id="one-min">1 min</button>
            <button id="three-min">3 min</button>
            <button id="five-min">5 min</button>
        </div>
        <div class="stats">
            <p>Completed Pomodoros: <span id="pomodoros">0</span></p>
        </div>
        <!-- Ad placement -->
        <div class="ad-container">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
                 data-ad-slot="XXXXXXXXXX"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
        <footer style="margin-top: 20px; font-size: 0.9rem; color: #666; text-align: center;">
            <a href="privacy.html">Privacy Policy</a>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
